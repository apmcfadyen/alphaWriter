<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #1E1E28;
    color: #E8E4DC;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 16px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #editor {
    flex: 1;
    padding: 24px 48px;
    outline: none;
    overflow-y: auto;
    line-height: 1.8;
    caret-color: #A89EC9;
    word-spacing: 0.05em;
  }

  ::selection {
    background-color: #3D3D55;
    color: #E8E4DC;
  }

  #editor p { margin-bottom: 0.6em; }
  #editor p:first-child { margin-top: 0; }

  #editor:empty::before {
    content: attr(data-placeholder);
    color: #5A5A6A;
    pointer-events: none;
    display: block;
  }

  #editor::-webkit-scrollbar { width: 6px; }
  #editor::-webkit-scrollbar-track { background: #1E1E28; }
  #editor::-webkit-scrollbar-thumb { background: #3A3A48; border-radius: 3px; }

  .comment {
    color: #5A5A6A;
    font-style: italic;
  }

  /* Entity highlights — display only, stripped before save */
  .entity            { color: #A89EC9; text-decoration: underline; cursor: pointer; }
  .entity-location   { color: #7EC8A4; }
  .entity-item       { color: #C8B07A; }
</style>
</head>
<body>
  <div id="editor"
       contenteditable="true"
       spellcheck="true"
       data-placeholder="Start writing...">
  </div>

<script>
  var _ready = false;
  var _notifyTimer = null;
  var _highlightTimer = null;

  // Raw content cache — captured before any DOM modification.
  // getContent() returns this so C# always gets a stable value.
  var _rawContent = '';
  var _wordCount = 0;

  // Entity manifest pushed from C# via setEntities().
  // Each entry: { id, type, terms: [...sorted longest-first] }
  var _entities = [];

  // ── Content API ─────────────────────────────────────────────────────────────

  function setContent(rawHtml) {
    clearTimeout(_notifyTimer);
    clearTimeout(_highlightTimer);
    _rawContent = rawHtml || '';
    _wordCount = computeWordCount(_rawContent);
    var highlighted = applyCommentHighlighting(_rawContent);
    highlighted = applyEntityHighlighting(highlighted);
    document.getElementById('editor').innerHTML = highlighted;
    _ready = true;
  }

  // Immediately captures the current editor DOM content into _rawContent,
  // cancels pending timers, and updates _wordCount. Called by C# before
  // switching scenes so that the outgoing scene's content is not lost.
  function flushContent() {
    clearTimeout(_notifyTimer);
    clearTimeout(_highlightTimer);
    _rawContent = stripAllVisualSpans(document.getElementById('editor').innerHTML);
    _wordCount = computeWordCount(_rawContent);
  }

  function getContent() {
    return _rawContent;
  }

  function computeWordCount(rawHtml) {
    var text = rawHtml;
    // Block-level tags → newline so // comments terminate at line breaks
    text = text.replace(/<br\s*\/?>/gi, '\n');
    text = text.replace(/<\/?(div|p|li|tr|h[1-6]|ul|ol|blockquote)[^>]*>/gi, '\n');
    // Strip remaining tags
    text = text.replace(/<[^>]*>/g, '');
    // Decode common entities
    text = text.replace(/&nbsp;/gi, ' ').replace(/&amp;/gi, '&')
               .replace(/&lt;/gi, '<').replace(/&gt;/gi, '>').replace(/&quot;/gi, '"');
    // Strip block then line comments
    text = text.replace(/\/\*[\s\S]*?\*\//g, '');
    text = text.replace(/\/\/[^\n]*/g, '');
    return text.trim().split(/\s+/).filter(function(w) { return w.length > 0; }).length;
  }

  function getWordCount() {
    return _wordCount;
  }

  // Atomic flush-and-return: combines flushContent + getContent + getWordCount
  // into a single call so C# needs only one EvaluateJavaScriptAsync round-trip.
  function flushAndGet() {
    flushContent();
    return JSON.stringify({ content: _rawContent, wordCount: _wordCount });
  }

  // ── Visual span stripping ────────────────────────────────────────────────────
  // Removes ALL display-only spans (comments + entities) to recover clean raw HTML.

  function stripAllVisualSpans(html) {
    // Strip inner (entity) spans first so outer (comment) spans have no nested </span>
    html = html.replace(/<span class="entity[^"]*"[^>]*>([\s\S]*?)<\/span>/gi, '$1');
    html = html.replace(/<span class="comment">([\s\S]*?)<\/span>/gi, '$1');
    // Strip heat map overlay spans so they never enter _rawContent
    html = html.replace(/<span class="heat-s"[^>]*>([\s\S]*?)<\/span>/gi, '$1');
    html = html.replace(/<span class="heat-w"[^>]*>([\s\S]*?)<\/span>/gi, '$1');
    return html;
  }

  // ── Comment highlighting ─────────────────────────────────────────────────────
  // Walks the HTML string, passing tags through unchanged.
  // Wraps // and /* */ patterns in <span class="comment">.
  // Block-level elements (div, p, br) terminate line comments.
  // Block comments persist through all elements (span is re-opened after each tag).

  function applyCommentHighlighting(html) {
    var result = '';
    var i = 0;
    var inLine = false;
    var inBlock = false;

    function openSpan()  { result += '<span class="comment">'; }
    function closeSpan() { result += '</span>'; inLine = false; inBlock = false; }

    while (i < html.length) {

      // ── HTML tag ─────────────────────────────────────────────────────────────
      if (html[i] === '<') {
        var end = html.indexOf('>', i);
        if (end === -1) { result += html.slice(i); break; }
        var tag = html.slice(i, end + 1);
        var isBlock = /^<(br|div|\/div|p|\/p|li|\/li)/i.test(tag);

        var wasBlock = inBlock;
        var wasLine  = inLine;

        // Close any active span before the tag (required for valid HTML)
        if (wasBlock || wasLine) closeSpan();
        result += tag;

        // Reopen block comment after every tag (it continues through all markup)
        if (wasBlock) { openSpan(); inBlock = true; }
        // Line comment: continue through inline tags, terminate at block elements
        else if (wasLine && !isBlock) { openSpan(); inLine = true; }
        // wasLine && isBlock → line comment terminated, do not reopen

        i = end + 1;
        continue;
      }

      // ── HTML entity — pass through intact ────────────────────────────────────
      if (html[i] === '&') {
        var semi = html.indexOf(';', i);
        if (semi !== -1 && semi - i <= 8) {
          result += html.slice(i, semi + 1);
          i = semi + 1;
          continue;
        }
      }

      // ── Block comment end: */ ─────────────────────────────────────────────────
      if (inBlock && i + 1 < html.length && html[i] === '*' && html[i + 1] === '/') {
        result += '*/';
        closeSpan();
        i += 2;
        continue;
      }

      // ── Block comment start: /* ───────────────────────────────────────────────
      if (!inLine && !inBlock && i + 1 < html.length && html[i] === '/' && html[i + 1] === '*') {
        openSpan(); inBlock = true;
        result += '/*';
        i += 2;
        continue;
      }

      // ── Line comment start: // ────────────────────────────────────────────────
      if (!inLine && !inBlock && i + 1 < html.length && html[i] === '/' && html[i + 1] === '/') {
        openSpan(); inLine = true;
        result += '//';
        i += 2;
        continue;
      }

      // ── Newline — terminates line comment ─────────────────────────────────────
      if (inLine && html[i] === '\n') {
        closeSpan();
        result += '\n';
        i++;
        continue;
      }

      result += html[i];
      i++;
    }

    if (inLine || inBlock) closeSpan();
    return result;
  }

  // ── Entity highlighting ──────────────────────────────────────────────────────
  // Walks text segments between HTML tags, matches entity names/aliases,
  // wraps matches in entity spans. Never touches tag attributes or existing spans.

  function setEntities(arr) {
    try {
      _entities = (arr || []).map(function(e) {
        var terms = [e.name].concat(e.aliases || [])
          .filter(function(t) { return t && t.trim().length > 0; });
        // Sort longest-first so "John Smith" is matched before "John"
        terms.sort(function(a, b) { return b.length - a.length; });
        return { id: e.id, type: e.type, terms: terms };
      }).filter(function(e) { return e.terms.length > 0; });
    } catch(err) {
      _entities = [];
    }
    // Refresh highlighting if a scene is already loaded. Wrapped in try-catch
    // so a DOM/caret error during refresh never kills the setEntities call and
    // never prevents _entities from being visible to subsequent setContent calls.
    if (_ready) {
      try { refreshHighlighting(); } catch(e) {}
    }
    return _entities.length;
  }

  function applyEntityHighlighting(html) {
    if (_entities.length === 0) return html;
    var result = '';
    var i = 0;
    while (i < html.length) {
      // Pass HTML tags through unchanged
      if (html[i] === '<') {
        var end = html.indexOf('>', i);
        if (end === -1) { result += html.slice(i); break; }
        result += html.slice(i, end + 1);
        i = end + 1;
        continue;
      }
      // Pass HTML entities through intact
      if (html[i] === '&') {
        var semi = html.indexOf(';', i);
        if (semi !== -1 && semi - i <= 8) {
          result += html.slice(i, semi + 1);
          i = semi + 1;
          continue;
        }
      }
      // Collect a plain-text segment up to the next tag
      var segEnd = html.indexOf('<', i);
      if (segEnd === -1) segEnd = html.length;
      result += matchEntitiesInSegment(html.slice(i, segEnd));
      i = segEnd;
    }
    return result;
  }

  function matchEntitiesInSegment(text) {
    var spans = [];
    for (var ei = 0; ei < _entities.length; ei++) {
      var entity = _entities[ei];
      for (var ti = 0; ti < entity.terms.length; ti++) {
        var term = entity.terms[ti];
        var escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        var pattern = new RegExp(escaped, 'gi');
        var m;
        while ((m = pattern.exec(text)) !== null) {
          var s = m.index;
          var e = s + m[0].length;
          // Word boundary: char before/after must not be a word character
          var before = s > 0 ? text[s - 1] : ' ';
          var after  = e < text.length ? text[e] : ' ';
          if (/\w/.test(before) || /\w/.test(after)) continue;
          // Reject if overlaps an already-claimed span
          var overlaps = false;
          for (var si = 0; si < spans.length; si++) {
            if (!(e <= spans[si].s || s >= spans[si].e)) { overlaps = true; break; }
          }
          if (!overlaps)
            spans.push({ s: s, e: e, id: entity.id, type: entity.type, matched: m[0] });
        }
      }
    }
    if (spans.length === 0) return text;
    spans.sort(function(a, b) { return a.s - b.s; });
    var out = '';
    var pos = 0;
    for (var si = 0; si < spans.length; si++) {
      var sp = spans[si];
      out += text.slice(pos, sp.s);
      out += '<span class="entity entity-' + sp.type + '" data-id="' + sp.id
           + '" data-type="' + sp.type + '">' + sp.matched + '</span>';
      pos = sp.e;
    }
    return out + text.slice(pos);
  }

  // ── Cursor save / restore ────────────────────────────────────────────────────
  // Block elements (div, p, br, li) each contribute +1 to the offset so that
  // "cursor at end of line N" and "cursor at start of empty line N+1" always
  // produce distinct offsets and survive an innerHTML replacement.

  var _BLOCK = /^(BR|DIV|P|LI|H1|H2|H3|H4|H5|H6|UL|OL|BLOCKQUOTE)$/;
  function _isBlock(node) { return node.nodeType === 1 && _BLOCK.test(node.nodeName); }

  function getCaretOffset(el) {
    var sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return 0;
    var range   = sel.getRangeAt(0);
    var endNode = range.endContainer;
    var endOff  = range.endOffset;
    var count   = 0;
    var found   = false;

    // Count all text + block entries in a subtree (no early-exit needed).
    function countSubtree(node) {
      if (node.nodeType === 3) { count += node.length; return; }
      if (node !== el && _isBlock(node)) count++;
      for (var i = 0; i < node.childNodes.length; i++) countSubtree(node.childNodes[i]);
    }

    function walk(node) {
      if (found) return;
      // Block elements (except root) add 1 to the running offset.
      if (node !== el && _isBlock(node)) count++;
      // Have we arrived at the cursor's container?
      if (node === endNode) {
        if (node.nodeType === 3) {
          count += endOff;
        } else {
          // Element node: count block children that come before endOff.
          for (var k = 0; k < endOff && k < node.childNodes.length; k++) {
            countSubtree(node.childNodes[k]);
          }
        }
        found = true;
        return;
      }
      if (node.nodeType === 3) { count += node.length; return; }
      for (var i = 0; i < node.childNodes.length; i++) {
        walk(node.childNodes[i]);
        if (found) return;
      }
    }

    walk(el);
    return count;
  }

  function setCaretOffset(el, offset) {
    var range = document.createRange();
    var sel   = window.getSelection();
    var count = 0;
    var found = false;

    function place(node, off) {
      try { range.setStart(node, off); range.collapse(true); found = true; } catch(e) {}
    }

    function walk(node) {
      if (found) return;
      if (node !== el && _isBlock(node)) {
        count++;
        // If the offset lands exactly at the start of this block, place cursor here.
        if (count === offset) { place(node, 0); return; }
      }
      if (node.nodeType === 3) {
        var len = node.length;
        if (count + len >= offset) { place(node, offset - count); }
        else { count += len; }
        return;
      }
      for (var i = 0; i < node.childNodes.length; i++) {
        walk(node.childNodes[i]);
        if (found) return;
      }
    }

    walk(el);
    if (!found) {
      // Fallback: move to end of editor content.
      try { range.setStart(el, el.childNodes.length); range.collapse(true); found = true; } catch(e) {}
    }
    if (found && sel) { sel.removeAllRanges(); sel.addRange(range); }
  }

  // ── Re-highlight in place (preserves cursor position) ───────────────────────

  function refreshHighlighting() {
    var editor = document.getElementById('editor');
    var pos = getCaretOffset(editor);
    var raw = stripAllVisualSpans(editor.innerHTML);
    var base = (_heatActive && _heatData) ? injectHeatOverlays(raw, _heatData) : raw;
    var highlighted = applyCommentHighlighting(base);
    highlighted = applyEntityHighlighting(highlighted);
    editor.innerHTML = highlighted;
    setCaretOffset(editor, pos);
  }

  // ── Formatting commands ──────────────────────────────────────────────────────

  function execFormat(command) {
    document.execCommand(command, false, null);
    document.getElementById('editor').focus();
    scheduleNotify();
  }

  // ── Change notification ──────────────────────────────────────────────────────
  // Notification and highlighting run on separate timers so the DOM is not
  // modified before C# reads the content via getContent().
  //
  // IMPORTANT: the URL includes a unique timestamp so WebView2 treats each call
  // as a new navigation. Without this, WebView2 ignores repeated navigations to
  // the same URL and C# never receives subsequent saves.

  function scheduleNotify() {
    clearTimeout(_notifyTimer);
    clearTimeout(_highlightTimer);

    // Capture raw content immediately on every input so _rawContent is always
    // current.  This ensures getContent() returns the latest text even if C#
    // calls flushContent()+getContent() before the 800ms debounce fires.
    _rawContent = stripAllVisualSpans(document.getElementById('editor').innerHTML);
    _wordCount = computeWordCount(_rawContent);

    _notifyTimer = setTimeout(function() {
      // Notify C# — unique URL forces a fresh Navigating event every time
      window.location.href = 'alphawriter://contentChanged?t=' + Date.now();
      // Apply visual highlighting shortly after (non-blocking for C# retrieval)
      _highlightTimer = setTimeout(refreshHighlighting, 50);
    }, 800);
  }

  document.getElementById('editor').addEventListener('input', scheduleNotify);

  // Paste as plain text only
  document.getElementById('editor').addEventListener('paste', function(e) {
    e.preventDefault();
    var text = (e.clipboardData || window.clipboardData).getData('text/plain');
    document.execCommand('insertText', false, text);
  });

  // ── Note navigation: scroll to sentence ─────────────────────────────────────
  // Called from C# after a note card click.  Finds the Nth sentence in the
  // current scene content, selects it (gives the native browser flash-highlight),
  // scrolls it into view, then clears the selection and places the cursor there
  // after 2 seconds.

  var _ABBREVS = /\b(mr|mrs|ms|dr|prof|sr|jr|st|ave|blvd|dept|est|vol|vs|etc|inc|ltd|corp|co|gen|gov|sgt|cpl|pvt|capt|lt|col|cmdr|adm|rev|hon|pres|sec|treas|amb)\.\s*$/i;

  // Strip HTML tags and decode entities to produce a plain-text string.
  function plainFromRaw(html) {
    return (html || '')
      .replace(/<br\s*\/?>/gi, ' ')
      .replace(/<\/?(p|div|li|h[1-6])[^>]*>/gi, ' ')
      .replace(/<[^>]*>/g, '')
      .replace(/&nbsp;/gi, ' ').replace(/&amp;/gi, '&')
      .replace(/&lt;/gi, '<').replace(/&gt;/gi, '>')
      .replace(/&quot;/gi, '"').replace(/&#39;/gi, "'")
      .replace(/\s+/g, ' ').trim();
  }

  // Split plain text into sentences using the same boundary regex as C#'s
  // NlpTextExtractor.SplitSentences: split on [.!?] followed by whitespace +
  // uppercase / opening-quote, then merge abbreviation fragments.
  function splitSentences(text) {
    if (!text) return [];
    var parts = text.split(/(?<=[.!?])\s+(?=[A-Z"\u201C])/);
    var merged = [];
    parts.forEach(function(p) {
      var t = p.trim();
      if (!t) return;
      if (merged.length > 0 && _ABBREVS.test(merged[merged.length - 1])) {
        merged[merged.length - 1] += ' ' + t;
      } else {
        merged.push(t);
      }
    });
    return merged;
  }

  // Walk the editor DOM using a TreeWalker, collect all text nodes, then find
  // the target string and return a Range spanning it.
  function findTextRange(root, target) {
    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
    var nodes = [], node;
    while ((node = walker.nextNode())) nodes.push(node);

    // Flatten all text
    var full = nodes.map(function(n) { return n.textContent; }).join('');
    var t = target.replace(/\s+/g, ' ').trim();
    var idx = full.indexOf(t);

    // Fallback: try the first 80 chars (handles long sentences spanning many nodes)
    if (idx === -1 && t.length > 80) {
      t = t.substring(0, 80);
      idx = full.indexOf(t);
    }
    if (idx === -1) return null;

    var range = document.createRange();
    var pos = 0;
    var end = idx + t.length;
    var startSet = false, endSet = false;

    for (var i = 0; i < nodes.length; i++) {
      var len = nodes[i].textContent.length;
      if (!startSet && pos + len > idx) {
        try { range.setStart(nodes[i], idx - pos); startSet = true; } catch(e) {}
      }
      if (startSet && !endSet && pos + len >= end) {
        try { range.setEnd(nodes[i], end - pos); endSet = true; } catch(e) {}
        break;
      }
      pos += len;
    }
    return (startSet && endSet) ? range : null;
  }

  function scrollToSentence(index) {
    if (index < 0 || !_ready) return;
    var plain     = plainFromRaw(_rawContent);
    var sentences = splitSentences(plain);
    if (index >= sentences.length) return;
    var target = sentences[index].trim();
    if (!target) return;

    var editor = document.getElementById('editor');
    var range  = findTextRange(editor, target);
    if (!range) return;

    // Select the sentence — browser renders it with the native selection highlight
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    // Scroll the start of the sentence into the middle of the viewport
    try {
      var startNode = range.startContainer;
      var el = startNode.nodeType === 3 ? startNode.parentElement : startNode;
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } catch(e) {}

    // After 2 s: collapse selection to start so the cursor lands at the sentence
    setTimeout(function() {
      try {
        var r2 = range.cloneRange();
        r2.collapse(true);
        var s2 = window.getSelection();
        s2.removeAllRanges();
        s2.addRange(r2);
        editor.focus();
      } catch(e) {}
    }, 2000);
  }

  // ── Heat Map overlay ─────────────────────────────────────────────────────────
  // Sentence-level prose overlay driven by NLP analysis results.
  // applyHeatMap(data) / clearHeatMap() called from C# via EvaluateJavaScriptAsync.
  // Heat spans are stripped by stripAllVisualSpans so _rawContent stays clean.

  var _heatActive = false;
  var _heatData   = null;

  // Count sentences in plain text using terminal-punctuation heuristic.
  function countSentencesInText(text) {
    if (!text || !text.trim()) return 0;
    var endings = text.match(/[.!?]+(?:\s+[A-Z]|$)/g) || [];
    return endings.length > 0 ? endings.length : 1;
  }

  // Build combined CSS style string from an array of heat flag names.
  // Border-left flags are mutually exclusive (passive wins over adverbs/complex).
  function buildHeatStyle(flags) {
    var border = '';
    var bg     = '';
    var td     = '';
    flags.forEach(function(f) {
      if      (f === 'passive'        && !border) border = 'border-left:3px solid rgba(224,108,117,0.65);padding-left:6px;margin-left:-6px;';
      else if (f === 'adverbs'        && !border) border = 'border-left:3px solid rgba(229,192,123,0.65);padding-left:6px;margin-left:-6px;';
      else if (f === 'complex'        && !border) border = 'border-left:3px solid rgba(130,170,255,0.45);padding-left:6px;margin-left:-6px;';
      if      (f === 'show-dont-tell')            bg     = 'background:rgba(209,154,102,0.09);';
      if      (f === 'long')                      td     = 'text-decoration:underline dotted rgba(229,229,100,0.75);';
    });
    return border + bg + td;
  }

  // Walk an HTML string and highlight echo words in text segments only.
  function highlightEchoWords(html, words) {
    if (!words || !words.length) return html;
    var out = '';
    var i = 0;
    while (i < html.length) {
      if (html[i] === '<') {
        var end = html.indexOf('>', i);
        if (end === -1) { out += html.slice(i); break; }
        out += html.slice(i, end + 1);
        i = end + 1;
        continue;
      }
      var segEnd = html.indexOf('<', i);
      if (segEnd === -1) segEnd = html.length;
      var seg = html.slice(i, segEnd);
      words.forEach(function(w) {
        if (!w || w.length < 3) return;
        var esc = w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        seg = seg.replace(
          new RegExp('\\b' + esc + '\\b', 'gi'),
          '<span class="heat-w" style="font-weight:bold;color:rgba(229,192,123,0.92);">$&</span>'
        );
      });
      out += seg;
      i = segEnd;
    }
    return out;
  }

  // Inject heat overlay spans into raw HTML (no visual spans present).
  // Operates at paragraph granularity: wraps each <p>'s inner content with
  // a display:block span when any sentence in that paragraph is flagged.
  function injectHeatOverlays(rawHtml, data) {
    if (!data) return rawHtml;

    var flagsMap = {};
    (data.sentences || []).forEach(function(s) {
      if (s.flags && s.flags.length > 0) flagsMap[s.index] = s.flags;
    });
    var echoWords = data.echoWords || [];
    var hasFlags  = Object.keys(flagsMap).length > 0;
    var hasEchoes = echoWords.length > 0;
    if (!hasFlags && !hasEchoes) return rawHtml;

    var sentIdx = 0;
    var result  = rawHtml;

    // Wrap flagged paragraphs — accumulate all flags for sentences it contains.
    result = result.replace(/(<p(?:\s[^>]*)?>)([\s\S]*?)(<\/p>)/gi, function(m, open, inner, close) {
      var plain = inner.replace(/<[^>]*>/g, '').replace(/&[a-z#0-9]+;/gi, ' ');
      var count = Math.max(1, countSentencesInText(plain));

      var combinedFlags = [];
      for (var i = 0; i < count; i++) {
        var f = flagsMap[sentIdx + i];
        if (f) Array.prototype.push.apply(combinedFlags, f);
      }
      sentIdx += count;

      if (combinedFlags.length === 0) return m;
      var style = buildHeatStyle(combinedFlags);
      return open + '<span class="heat-s" style="display:block;' + style + '">' + inner + '</span>' + close;
    });

    if (hasEchoes) {
      result = highlightEchoWords(result, echoWords);
    }

    return result;
  }

  function applyHeatMap(data) {
    _heatActive = true;
    _heatData   = data;
    var editor  = document.getElementById('editor');
    var pos     = getCaretOffset(editor);
    var withHeat    = injectHeatOverlays(_rawContent, data);
    var highlighted = applyCommentHighlighting(withHeat);
    highlighted     = applyEntityHighlighting(highlighted);
    editor.innerHTML = highlighted;
    setCaretOffset(editor, pos);
  }

  function clearHeatMap() {
    _heatActive = false;
    _heatData   = null;
    refreshHighlighting();
  }

  // Entity click → notify C# with entity id and type
  document.getElementById('editor').addEventListener('click', function(e) {
    var t = e.target;
    while (t && t !== this) {
      if (t.classList && t.classList.contains('entity')) {
        e.preventDefault();
        var id   = t.getAttribute('data-id');
        var type = t.getAttribute('data-type');
        if (id && type) {
          window.location.href = 'alphawriter://entityClicked?id='
            + encodeURIComponent(id) + '&type=' + encodeURIComponent(type);
        }
        return;
      }
      t = t.parentElement;
    }
  });
</script>
</body>
</html>
